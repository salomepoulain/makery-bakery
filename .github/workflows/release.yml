name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate tarball
        run: |
          git archive --format=tar.gz ${{ github.ref }}:makery -o makery-bakery-${{ github.ref_name }}.tar.gz

      - name: Generate SHA256 checksum
        run: |
          sha256sum makery-bakery-${{ github.ref_name }}.tar.gz > makery-bakery-${{ github.ref_name }}.tar.gz.sha256

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            makery-bakery-${{ github.ref_name }}.tar.gz \
            makery-bakery-${{ github.ref_name }}.tar.gz.sha256 \
            install/install_bake.sh \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}"
